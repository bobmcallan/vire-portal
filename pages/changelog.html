<!DOCTYPE html>
<html lang="en">
<head>
    {{template "head.html" .}}
    <title>VIRE CHANGELOG</title>
</head>
<body>
    {{if .LoggedIn}}{{template "nav.html" .}}{{end}}
    <main class="page" x-data="changelogPage()">
        <div class="page-body">

            <template x-if="loading">
                <div class="help-loading">Loading changelog...</div>
            </template>

            <template x-if="error">
                <div class="warning-banner" x-text="error"></div>
            </template>

            <template x-if="!loading && !error && entries.length === 0">
                <p class="text-muted text-sm">No changelog entries.</p>
            </template>

            <template x-if="!loading && entries.length > 0">
                <div>
                    <template x-for="entry in pagedEntries" :key="entry.id">
                        <section class="panel-headed changelog-entry" style="margin-bottom:1.5rem">
                            <div class="panel-header">
                                <span x-text="formatDate(entry.created_at)"></span>
                            </div>
                            <div class="panel-content">
                                <div class="changelog-meta">
                                    <span class="badge" x-text="entry.service"></span>
                                    <span class="badge badge-muted" x-text="entry.service_version || ''"></span>
                                </div>
                                <h3 class="changelog-heading" x-text="parseHeading(entry.content)"></h3>
                                <div class="changelog-body" x-text="parseBody(entry.content)"></div>
                            </div>
                        </section>
                    </template>

                    <div class="pagination" x-show="totalPages > 1" x-cloak>
                        <button class="btn btn-secondary btn-sm" @click="prevPage()" :disabled="currentPage <= 1">PREV</button>
                        <span class="pagination-info" x-text="'PAGE ' + currentPage + ' OF ' + totalPages"></span>
                        <button class="btn btn-secondary btn-sm" @click="nextPage()" :disabled="currentPage >= totalPages">NEXT</button>
                    </div>
                </div>
            </template>

        </div>
    </main>
    {{template "footer.html" .}}

    <script>window.__VIRE_DATA__ = { entries: {{.EntriesJSON}} };</script>
    <script>
    function changelogPage() {
        return {
            entries: [],
            loading: true,
            error: null,
            currentPage: 1,
            pageSize: 10,

            get totalPages() {
                return Math.max(1, Math.ceil(this.entries.length / this.pageSize));
            },

            get pagedEntries() {
                const start = (this.currentPage - 1) * this.pageSize;
                return this.entries.slice(start, start + this.pageSize);
            },

            init() {
                const ssrData = window.__VIRE_DATA__;
                if (ssrData && ssrData.entries) {
                    this.entries = ssrData.entries;
                    this.loading = false;
                    window.__VIRE_DATA__ = null;
                    return;
                }
                fetch('/api/changelog?per_page=100&page=1')
                    .then(r => {
                        if (!r.ok) throw new Error('Failed to load changelog');
                        return r.json();
                    })
                    .then(data => {
                        this.entries = data.items || [];
                        this.loading = false;
                    })
                    .catch(err => {
                        this.error = err.message;
                        this.loading = false;
                    });
            },

            prevPage() {
                if (this.currentPage > 1) {
                    this.currentPage--;
                    window.scrollTo(0, 0);
                }
            },

            nextPage() {
                if (this.currentPage < this.totalPages) {
                    this.currentPage++;
                    window.scrollTo(0, 0);
                }
            },

            formatDate(iso) {
                if (!iso) return '';
                const d = new Date(iso);
                return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
            },

            parseHeading(content) {
                if (!content) return '';
                const firstLine = content.split('\n')[0] || '';
                return firstLine.replace(/^#+\s*/, '').trim();
            },

            parseBody(content) {
                if (!content) return '';
                const lines = content.split('\n');
                let start = 1;
                while (start < lines.length && lines[start].trim() === '') { start++; }
                return lines.slice(start).join('\n').trim();
            },
        };
    }
    </script>
</body>
</html>
